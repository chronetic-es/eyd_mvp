<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espina y Delfin — Panel Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'eyd': { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                        'cyan': { 50: '#ecfeff', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-eyd-800 text-white px-6 py-4 shadow-lg flex items-center justify-between sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <svg class="w-7 h-7 text-cyan-300" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C12 2 5.5 11 5.5 15a6.5 6.5 0 1013 0C18.5 11 12 2 12 2zm0 18a4.5 4.5 0 01-4.5-4.5c0-.73.15-1.42.42-2.06.07.01.14.02.21.02a2.25 2.25 0 002.1-1.46A7.6 7.6 0 0012 15.5a4.49 4.49 0 004.5-4.5 4.24 4.24 0 00-.09-.87A4.49 4.49 0 0112 20z"/>
            </svg>
            <div>
                <h1 class="text-lg font-bold leading-tight">Espina y Delfin, S.A.</h1>
                <p class="text-xs text-cyan-200 -mt-0.5">Panel Operativo</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="clock" class="text-sm font-mono text-cyan-100 hidden sm:inline"></span>
            <button id="refresh-btn"
                    class="bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Actualizar
            </button>
        </div>
    </nav>

    <!-- Tabs -->
    <div id="tabs" class="bg-white border-b px-6 flex gap-1 overflow-x-auto sticky top-[60px] z-30 shadow-sm">
        <button class="tab-btn active" data-tab="resumen">Resumen</button>
        <button class="tab-btn" data-tab="abonados">Abonados</button>
        <button class="tab-btn" data-tab="facturacion">Facturacion</button>
        <button class="tab-btn" data-tab="incidencias">Incidencias</button>
        <button class="tab-btn" data-tab="partes">Partes</button>
        <button class="tab-btn" data-tab="llamadas">Llamadas</button>
    </div>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        <section id="sec-resumen" class="dash-section space-y-5"></section>
        <section id="sec-abonados" class="dash-section space-y-5 hidden"></section>
        <section id="sec-facturacion" class="dash-section space-y-5 hidden"></section>
        <section id="sec-incidencias" class="dash-section space-y-5 hidden"></section>
        <section id="sec-partes" class="dash-section space-y-5 hidden"></section>
        <section id="sec-llamadas" class="dash-section space-y-5 hidden"></section>
    </main>

    <footer class="text-center text-xs text-gray-400 py-6">Espina y Delfin, S.A. — Panel Operativo</footer>

    <!-- Overlays -->
    <div id="modal-root"></div>
    <div id="toast-root" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
